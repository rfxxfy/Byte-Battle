name: Deploy

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target == 'staging' && 'staging' || 'production' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set deployment config
        run: |
          TARGET="${{ inputs.target || 'production' }}"
          if [ "$TARGET" = "staging" ]; then
            echo "DEPLOY_DIR=/opt/bytebattle-staging" >> $GITHUB_ENV
            echo "COMPOSE_FILE=docker-compose.staging.yaml" >> $GITHUB_ENV
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV
          else
            echo "DEPLOY_DIR=/opt/bytebattle" >> $GITHUB_ENV
            echo "COMPOSE_FILE=docker-compose.prod.yaml" >> $GITHUB_ENV
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          fi

      # ─── Build & push Docker image ──────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: echo "IMAGE_LC=${REGISTRY}/${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_LC }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_LC }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── Build frontend ─────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      # ─── Deploy to VPS ─────────────────────────────────────────────────
      - name: Copy compose and Caddyfile to prod dir
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yaml,docker-compose.staging.yaml,Caddyfile"
          target: /opt/bytebattle/

      - name: Copy frontend to target dir
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend/dist"
          target: ${{ env.DEPLOY_DIR }}/

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Login to GitHub Container Registry
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            IMAGE=${{ env.IMAGE_LC }}

            # Update image in target .env
            sed -i "s|^IMAGE=.*|IMAGE=${IMAGE}|" ${{ env.DEPLOY_DIR }}/.env \
              || echo "IMAGE=${IMAGE}" >> ${{ env.DEPLOY_DIR }}/.env

            # Pull new image and restart stack
            docker compose -f /opt/bytebattle/${{ env.COMPOSE_FILE }} pull app
            docker compose -f /opt/bytebattle/${{ env.COMPOSE_FILE }} up -d

            # Reload Caddy to pick up any Caddyfile changes
            docker compose -f /opt/bytebattle/docker-compose.prod.yaml exec -T caddy \
              caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || true
