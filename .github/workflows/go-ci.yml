name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Go tool binaries
        uses: actions/cache@v5
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-tools-${{ hashFiles('Makefile', '.github/workflows/go-ci.yml') }}

      - name: Install tools
        run: make tools

      - name: Generate API
        run: make generate-api

      - name: Check api.gen.go is up to date
        run: git diff --exit-code internal/api/api.gen.go

      - name: Generate sqlc
        run: make generate-sqlc

      - name: Check sqlc files are up to date
        run: git diff --exit-code internal/db/sqlc/

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0

      - name: Build
        run: go build ./...

      - name: Run unit tests
        run: |
          PKGS=$(go list ./... | grep -v /e2e)
          gotestsum --junitfile report.xml --format github-actions -- -race -count=1 $PKGS

      - name: Run e2e tests
        run: gotestsum --junitfile report-e2e.xml --format github-actions -- -race -count=1 -timeout 300s ./internal/e2e/...

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-test-report
          retention-days: 7
          path: |
            report.xml
            report-e2e.xml

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build
