name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cache Go tool binaries
        uses: actions/cache@v5
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-tools-${{ hashFiles('Makefile', '.github/workflows/go-ci.yml') }}

      - name: Install tools
        run: |
          make tools
          go install github.com/jstemmer/go-junit-report/v2@v2.1.0

      - name: Generate API
        run: make generate-api

      - name: Check api.gen.go is up to date
        run: git diff --exit-code internal/api/api.gen.go

      - name: Generate sqlc
        run: make generate-sqlc

      - name: Check sqlc files are up to date
        run: git diff --exit-code internal/db/sqlc/

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0

      - name: Build
        run: go build ./...

      - name: Run unit tests
        run: |
          go test -v -json -race -count=1 $(go list ./... | grep -v /e2e) 2>test-stderr.log | tee test-output.json | go-junit-report -set-exit-code > report.xml

      - name: Run e2e tests
        run: |
          go test -v -json -race -count=1 -timeout 120s ./internal/e2e/... 2>>test-stderr.log | tee -a test-output.json | go-junit-report -set-exit-code >> report.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-test-report
          retention-days: 7
          path: |
            report.xml
            test-output.json
            test-stderr.log
