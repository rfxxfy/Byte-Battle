version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/queries"
    schema: "migrations"
    gen:
      go:
        package: "sqlcdb"
        out: "internal/db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - column: "games.status"
            go_type: "string"
          - column: "problems.difficulty"
            go_type: "string"
          - column: "solutions.status"
            go_type: "string"
