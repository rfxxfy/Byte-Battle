version: '2'

run:
  timeout: 5m
  tests: true
  concurrency: 8

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck

    - gocritic
    - misspell

    - gosec
    - bodyclose
    - sqlclosecheck

    - gocognit

  exclusions:
    paths:
      - internal/db/sqlc
      - frontend/node_modules
    rules:
      - path: _test\.go
        linters:
          - gocognit
          - gosec
          - bodyclose
      # weak random is fine for non-security purposes
      - linters: [gosec]
        text: "G404"
      # http server without timeout is acceptable in this context
      - linters: [gosec]
        text: "G114"
      # directory/file permission checks
      - linters: [gosec]
        text: "G30[1246]"
      # integer overflow int->int32 for DB SERIAL IDs
      - linters: [gosec]
        text: "G115"
      # integer overflow from strconv.Atoi to int32 for DB IDs is safe (IDs are small)
      - linters: [gosec]
        text: "G109"
        path: "internal/server/handler\\.go"
      # db.Close() error is unactionable in error paths
      - linters: [gosec]
        text: "G104"

  settings:
    errcheck:
      exclude-functions:
        - (*database/sql.Tx).Rollback
        - (*database/sql.DB).Close
        - (github.com/jackc/pgx/v5.Tx).Rollback
        - (io.Closer).Close
        - (*github.com/gorilla/websocket.Conn).Close
        - (*github.com/gorilla/websocket.Conn).SetReadDeadline
        - (*github.com/gorilla/websocket.Conn).SetWriteDeadline

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - commentFormatting
        - hugeParam

    gocognit:
      min-complexity: 15

    misspell: {}

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - bytebattle
  exclusions:
    paths:
      - internal/db/sqlc
