# Staging stack — runs on the same VPS alongside production.
# Requires a shared Docker network to exist (created once on the VPS):
#   docker network create bytebattle-shared
#
# Requires /opt/bytebattle-staging/.env with the same variables as production .env.

name: bytebattle-staging

services:
  migrate:
    image: ${IMAGE}:staging
    entrypoint: ["/usr/local/bin/migrate"]
    command: ["-path", "/app/migrations", "-database", "postgres://${DB_USER}:${DB_PASSWORD}@staging-postgres:5432/${DB_NAME}?sslmode=disable", "up"]
    restart: "no"
    depends_on:
      staging-postgres:
        condition: service_healthy

  app:
    image: ${IMAGE}:staging
    container_name: bytebattle-staging-app
    restart: unless-stopped
    user: "${DEPLOY_UID}"
    depends_on:
      staging-postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DB_DSN: postgres://${DB_USER}:${DB_PASSWORD}@staging-postgres:5432/${DB_NAME}?sslmode=disable
      HTTP_PORT: "8080"
      PROBLEMS_DIR: /app/problems
      ALLOWED_ORIGINS: https://staging.bytebattle.online
      HTTP_RATE_PER_MINUTE: ${HTTP_RATE_PER_MINUTE:-100}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@bytebattle.dev}
    volumes:
      - /opt/bytebattle/problems:/app/problems:ro
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - default
      - shared
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  staging-postgres:
    image: postgres:18
    container_name: bytebattle-staging-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - staging_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

networks:
  shared:
    external: true
    name: bytebattle-shared

volumes:
  staging_postgres_data:
