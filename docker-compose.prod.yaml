# Production compose — used on VPS
# Requires .env with IMAGE, DB_*, HTTP_PORT variables
#
# IMAGE is set by the deploy workflow, e.g.:
#   IMAGE=ghcr.io/owner/byte-battle

name: bytebattle

services:
  caddy:
    image: caddy:2.11.2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/srv/frontend:ro
      - /opt/bytebattle-staging/frontend/dist:/srv/staging-frontend:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - default
      - shared
    depends_on:
      app:
        condition: service_healthy

  migrate:
    image: ${IMAGE}:latest
    entrypoint: ["/usr/local/bin/migrate"]
    command: ["-path", "/app/migrations", "-database", "postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable", "up"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    image: ${IMAGE}:latest
    container_name: bytebattle-app
    restart: unless-stopped
    user: "${DEPLOY_UID}"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DB_DSN: postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      HTTP_PORT: "8080"
      PROBLEMS_DIR: /app/problems
      ALLOWED_ORIGINS: https://bytebattle.online
      HTTP_RATE_PER_MINUTE: ${HTTP_RATE_PER_MINUTE:-100}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@bytebattle.dev}
    volumes:
      - ./problems:/app/problems:ro
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  postgres:
    image: postgres:18
    container_name: bytebattle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

networks:
  shared:
    external: true
    name: bytebattle-shared

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
