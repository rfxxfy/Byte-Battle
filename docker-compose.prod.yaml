# Production compose — used on VPS
# Requires .env with IMAGE, DB_*, HTTP_PORT variables
#
# IMAGE is set by the deploy workflow, e.g.:
#   IMAGE=ghcr.io/owner/byte-battle

services:
  migrate:
    image: ${IMAGE}:latest
    entrypoint: ["/usr/local/bin/migrate"]
    command: ["-path", "/app/migrations", "-database", "postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable", "up"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    image: ${IMAGE}:latest
    container_name: bytebattle-app
    restart: unless-stopped
    user: "${DEPLOY_UID}"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${HTTP_PORT}:8080"
    environment:
      DB_DSN: postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      HTTP_PORT: "8080"
      PROBLEMS_DIR: /app/problems
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    volumes:
      - ./problems:/app/problems:ro
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  postgres:
    image: postgres:18
    container_name: bytebattle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

volumes:
  postgres_data:
