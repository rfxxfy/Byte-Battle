<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Код подтверждения</title>
  </head>
  <body style="margin:0;padding:0;background:#0a0a0a;font-family:Inter,Arial,sans-serif;color:#e5e7eb;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#121212;border:1px solid #262626;border-radius:14px;overflow:hidden;">
            <tr>
              <td style="padding:20px 24px;background:#0f0f0f;border-bottom:1px solid #1a1a1a;"><span style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;font-weight:600;letter-spacing:-0.02em;"><span style="color:#4ade80;">Byte</span><span style="color:#e8e8e8;">Battle</span></span></td>
            </tr>
            <tr>
              <td style="padding:28px 24px 8px 24px;font-size:24px;line-height:1.3;font-weight:700;color:#f9fafb;">Ваш код подтверждения</td>
            </tr>
            <tr>
              <td style="padding:0 24px 20px 24px;font-size:15px;line-height:1.6;color:#9ca3af;">Введите этот код на странице входа. Код действует 15 минут.</td>
            </tr>
            <tr>
              <td style="padding:0 24px 28px 24px;text-align:center;">
                <div style="display:inline-block;padding:16px 32px;border-radius:12px;border:1px solid #22c55e;background:#052e16;color:#4ade80;font-size:36px;font-weight:700;font-family:monospace;letter-spacing:0.2em;">{{.Code}}</div>
              </td>
            </tr>
            <tr>
              <td style="padding:0 24px 20px 24px;font-size:13px;line-height:1.6;color:#6b7280;">Если вы не запрашивали код, просто проигнорируйте это письмо.</td>
            </tr>
            <tr>
              <td style="padding:16px 24px;border-top:1px solid #1a1a1a;font-size:12px;color:#4b5563;text-align:center;">bytebattle.online</td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
