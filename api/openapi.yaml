openapi: "3.0.3"
info:
  title: Byte Battle API
  version: "0.1.0"

security: []  # default: no auth required; individual operations opt-in via BearerAuth

paths:
  /auth/enter:
    post:
      operationId: PostAuthEnter
      summary: Request a magic code via email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnterRequest"
      responses:
        "200":
          description: Code sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          $ref: "#/components/responses/Error"

  /auth/confirm:
    post:
      operationId: PostAuthConfirm
      summary: Verify magic code and get session token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmRequest"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"

  /auth/me:
    get:
      operationId: GetAuthMe
      summary: Get current authenticated user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Error"

  /auth/logout:
    post:
      operationId: PostAuthLogout
      summary: End current session
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "401":
          $ref: "#/components/responses/Error"

  /problems:
    get:
      operationId: ListProblems
      summary: List all available problems
      security: []
      responses:
        "200":
          description: List of problems
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProblemsResponse"

  /problems/{problem_id}:
    get:
      operationId: GetProblem
      summary: Get problem by ID
      security: []
      parameters:
        - name: problem_id
          in: path
          required: true
          schema:
            type: string
          example: "001-two-sum"
      responses:
        "200":
          description: Problem found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemResponse"
        "404":
          $ref: "#/components/responses/Error"

  /games:
    post:
      operationId: CreateGame
      summary: Create a new game
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGameRequest"
      responses:
        "201":
          description: Game created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

    get:
      operationId: ListGames
      summary: List games with pagination
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of games
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListGamesResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /games/{id}:
    get:
      operationId: GetGame
      summary: Get game by ID
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GameID"
      responses:
        "200":
          description: Game found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameResponse"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

    delete:
      operationId: DeleteGame
      summary: Delete game by ID
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GameID"
      responses:
        "200":
          description: Game deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletedResponse"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /games/{id}/start:
    post:
      operationId: StartGame
      summary: Start a pending game
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GameID"
      responses:
        "200":
          description: Game started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /games/{id}/complete:
    post:
      operationId: CompleteGame
      summary: Complete a game with a winner
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GameID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteGameRequest"
      responses:
        "200":
          description: Game completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /games/{id}/join:
    post:
      operationId: JoinGame
      summary: Join a pending game as a participant
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GameID"
      responses:
        "200":
          description: Joined game
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"

  /games/{id}/cancel:
    post:
      operationId: CancelGame
      summary: Cancel a game
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GameID"
      responses:
        "200":
          description: Game cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  parameters:
    GameID:
      name: id
      in: path
      required: true
      schema:
        type: integer

  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      required:
        - error_code
        - message
      properties:
        error_code:
          type: string
          example: GAME_NOT_FOUND
        message:
          type: string
          example: game not found

    StatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok

    EnterRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string

    ConfirmRequest:
      type: object
      required:
        - email
        - code
      properties:
        email:
          type: string
        code:
          type: string

    TokenResponse:
      type: object
      required:
        - token
        - expires_at
      properties:
        token:
          type: string
        expires_at:
          type: string
          format: date-time

    MeResponse:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: integer

    DeletedResponse:
      type: object
      required:
        - deleted
      properties:
        deleted:
          type: boolean

    CountResponse:
      type: object
      required:
        - count
      properties:
        count:
          type: integer
          format: int64

    Problem:
      type: object
      required:
        - id
        - title
        - description
        - difficulty
        - time_limit_ms
        - memory_limit_mb
      properties:
        id:
          type: string
          example: "001-two-sum"
        title:
          type: string
        description:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard]
        time_limit_ms:
          type: integer
        memory_limit_mb:
          type: integer
        test_count:
          type: integer
          description: Number of test cases

    ProblemResponse:
      type: object
      required:
        - problem
      properties:
        problem:
          $ref: "#/components/schemas/Problem"

    ListProblemsResponse:
      type: object
      required:
        - problems
      properties:
        problems:
          type: array
          items:
            $ref: "#/components/schemas/Problem"

    Game:
      type: object
      required:
        - id
        - problem_id
        - status
        - participant_ids
        - created_at
        - updated_at
      properties:
        id:
          type: integer
        problem_id:
          type: string
          example: "001-two-sum"
        winner_id:
          type: integer
          nullable: true
        status:
          type: string
          enum: [pending, active, finished, cancelled]
        participant_ids:
          type: array
          items:
            type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    GameResponse:
      type: object
      required:
        - game
      properties:
        game:
          $ref: "#/components/schemas/Game"

    ListGamesResponse:
      type: object
      required:
        - games
        - total
      properties:
        games:
          type: array
          items:
            $ref: "#/components/schemas/Game"
        total:
          type: integer
          format: int64

    CreateGameRequest:
      type: object
      required:
        - problem_id
      properties:
        problem_id:
          type: string
          example: "001-two-sum"

    CompleteGameRequest:
      type: object
      required:
        - winner_id
      properties:
        winner_id:
          type: integer
          minimum: 1
